[server]
host = "127.0.0.1"
port = 8000

[rate_limit]
rpm = 1000
window_seconds = 60

[fetch]
fuzzy_window_days = 1
default_sleep = 0.5
bulk_min_delay = 0.8
bulk_max_delay = 1.5

[database]
# Supported: sqlite, mysql, mariadb, postgresql
type = "sqlite"
# For SQLite, use a file path. For others, use a SQLAlchemy URL.
path = "namehistory.db"
# Example for MySQL/MariaDB: "mysql+pymysql://user:password@localhost/dbname"
# Example for PostgreSQL: "postgresql+psycopg2://user:password@localhost/dbname"
# url = ""

[logging]
level = "INFO"
json = false
file = ""
max_bytes = 10485760
backup_count = 3

[auto_update]
enabled = true
check_interval_minutes = 60
mojang_stale_hours = 6
scraper_stale_hours = 24
batch_size = 10

[skins]
cache_dir = "skin_cache"

[providers]
# Hypixel API key — prefer HYPIXEL_API_KEY in .env (see .env.example)
hypixel_api_key = ""

# LabyMod v3 challenge (Turnstile) — optional; use /api/minecraft/captcha if unset
# laby_turnstile_site_key = ""
# laby_challenge_token = ""
# laby_challenge_header = "X-Challenge-Token"
# challenge_ttl_minutes = 45

[votes]
# Vote sites only support per-server checks (not a global player vote history).
# NameMC checks server likes (no API key). Others need each server's listing API key.

[votes.sites]
namemc = true
minecraft_mp = true
minecraftpocket_servers = true
trustmyserver = true
topgservers = true

[[votes.servers]]
id = "hypixel"
name = "Hypixel"
address = "mc.hypixel.net"
namemc = true
# minecraft_mp_key = "your-server-key-from-minecraft-mp.com"
# topgservers_key = "tgs_your_key"

